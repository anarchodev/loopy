<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>loopy editor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; display: flex; flex-direction: column; height: 100vh; }
    #toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #252526; border-bottom: 1px solid #3c3c3c; }
    #toolbar span { font-size: 13px; color: #858585; }
    #save-btn { padding: 4px 14px; background: #0e639c; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-size: 13px; }
    #save-btn:hover { background: #1177bb; }
    #save-btn:disabled { background: #3c3c3c; cursor: default; }
    #status { font-size: 12px; color: #858585; margin-left: auto; }
    #status.ok { color: #4ec9b0; }
    #status.err { color: #f44747; }
    .CodeMirror { flex: 1; height: 100%; font-size: 14px; line-height: 1.5; }
    .CodeMirror-scroll { height: 100%; }
    #editor-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span>index.mjs</span>
    <button id="save-btn">Save</button>
    <span id="status"></span>
  </div>
  <div id="editor-wrap">
    <textarea id="editor"></textarea>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  <script>
    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: { name: 'javascript', esVersion: 2020 },
      theme: 'default',
      lineNumbers: true,
      tabSize: 2,
      indentWithTabs: false,
      lineWrapping: false,
    });

    cm.getWrapperElement().style.height = '100%';

    const statusEl = document.getElementById('status');
    const saveBtn = document.getElementById('save-btn');

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || '';
    }

    async function loadFile() {
      setStatus('loading…');
      try {
        const args = encodeURIComponent(JSON.stringify(['index.mjs']));
        const res = await fetch(`http://localhost:7070/?func=_system/files.mjs:getFile&args=${args}`);
        const text = await res.text();
        cm.setValue(text);
        setStatus('loaded', 'ok');
      } catch (e) {
        setStatus('load failed: ' + e.message, 'err');
      }
    }

    async function saveFile() {
      saveBtn.disabled = true;
      setStatus('saving…');
      try {
        const res = await fetch('http://localhost:7070/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            func: '_system/files.mjs:saveFile',
            args: ['index.mjs', cm.getValue()],
          }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        setStatus('saved', 'ok');
      } catch (e) {
        setStatus('save failed: ' + e.message, 'err');
      } finally {
        saveBtn.disabled = false;
      }
    }

    saveBtn.addEventListener('click', saveFile);

    loadFile();
  </script>
</body>
</html>
